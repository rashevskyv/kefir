[Overclock status]
catch_errors
toggle_state file_exists /switch/.overlays/sys-clk-overlay.ovl

toggle_on copy /config/oc/atmosphere/ /
toggle_on copy /config/oc/bootloader/ /
toggle_on copy /config/oc/switch/.overlays/sys-clk-overlay.ovl /switch/.overlays/sys-clk-overlay.ovl
toggle_on copy /config/oc/config/ /
toggle_on move /config/oc_bkp/config/sys-clk/config.ini /config/sys-clk/config.ini
toggle_on reboot

toggle_off del /atmosphere/contents/00FF0000636C6BFF/
toggle_off del /atmosphere/kips/kefir.kip
toggle_off del /bootloader/loader.kip
toggle_off del /switch/.overlays/sys-clk-overlay.ovl
toggle_off move /config/sys-clk/config.ini /config/oc_bkp/config/sys-clk/config.ini
toggle_off reboot

[40mb memory on FW20+ status]
catch_errors
toggle_state file_exists /config/uberhand/packages/settings/40mb.te

toggle_on copy '/config/40mb/install.te' '/startup.te'
toggle_on copy '/bootloader/payloads/TegraExplorer.bin' '/payload.bin'
toggle_on reboot

toggle_off move '/config/uberhand/packages/settings/40mb.te' '/startup.te'
toggle_off copy '/bootloader/payloads/TegraExplorer.bin' '/payload.bin'
toggle_off reboot

