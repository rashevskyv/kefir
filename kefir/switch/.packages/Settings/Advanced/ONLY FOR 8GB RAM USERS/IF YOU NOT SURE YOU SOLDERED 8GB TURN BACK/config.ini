-- ONLY FOR USERS WITH 8GB DRAM! 
-- IF YOU NOT SURE YOU SOLDERED 8GB
-- TURN BACK
-- For uninstalling, use TegraExplorer
[8GB DRAM status]
catch_errors
toggle_state file_exists /config/8gb/4gb_backup/payload.bin

toggle_on copy '/config/8gb/install.te' '/startup.te'
toggle_on copy '/bootloader/payloads/TegraExplorer.bin' '/payload.bin'
toggle_on reboot

toggle_off copy '/tegraexplorer/scripts/Remove_8GB-RAM_config.te' '/startup.te'
toggle_off copy '/bootloader/payloads/TegraExplorer.bin' '/payload.bin'
toggle_off reboot